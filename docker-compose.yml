version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: smart-leads-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: smart-leads
    volumes:
      - mongodb_data:/data/db
    networks:
      - smart-leads-network

  backend:
    build:
      context: .
      target: development
    container_name: smart-leads-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "5173:5173"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/smart-leads
      JWT_SECRET: smart-leads-jwt-secret-key-change-in-production
      CLIENT_URL: http://localhost:5173
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - smart-leads-network
    command: sh -c "npm run server:dev & npm run dev"

volumes:
  mongodb_data:

networks:
  smart-leads-network:
    driver: bridge
